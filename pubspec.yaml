name: alu_launch
description: >
  ALU Launch — connects African Leadership University students with
  verified student-led startups seeking interns and collaborators.
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ">=3.4.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # State management
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5

  # Routing
  go_router: ^14.2.0

  # Firebase
  firebase_core: ^3.3.0
  firebase_auth: ^5.1.4
  cloud_firestore: ^5.2.1
  firebase_messaging: ^15.0.4
  # NOTE: firebase_storage intentionally NOT used — Cloud Storage for Firebase
  # now requires the Blaze billing plan. Supabase Storage (below) is the
  # file-storage backend instead. See core/services/storage_service.dart.

  # File storage (avatars, resumes, portfolios, verification docs)
  supabase_flutter: ^2.5.11

  # Auth
  google_sign_in: ^6.2.1

  # Models / serialization
  freezed_annotation: ^3.0.0
  json_annotation: ^4.9.0

  # Local storage
  shared_preferences: ^2.2.3
  flutter_secure_storage: ^9.2.2

  # UI
  google_fonts: ^6.2.1
  cached_network_image: ^3.3.1
  fl_chart: ^0.68.0
  shimmer: ^3.0.0
  flutter_svg: ^2.0.10+1
  image_picker: ^1.1.2
  file_picker: ^8.0.6
  intl: ^0.19.0
  flutter_local_notifications: ^17.2.2

  # Utils
  equatable: ^2.0.5
  logger: ^2.4.0
  url_launcher: ^6.3.0
  path: ^1.9.0
  flutter_dotenv: ^5.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

  # Code generation
  build_runner: ^2.4.15
  freezed: ^3.0.0
  json_serializable: ^6.9.5
  riverpod_generator: ^2.6.5
  custom_lint: ^0.7.5
  riverpod_lint: ^2.6.5

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/icons/
    - .env

  # Note: Inter is loaded via google_fonts at runtime — no bundled font
  # files needed. If you later want to bundle fonts locally (avoids a
  # network fetch on first launch), add a `fonts:` list here pointing
  # to .ttf files under assets/fonts/.
